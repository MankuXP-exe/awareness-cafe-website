<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C6FF00" />
      <stop offset="100%" stop-color="#9ECC00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Logo Icon: Coffee cup (scaled down) -->
  <g transform="translate(2, 2) scale(0.62)">
    <!-- Cup Base -->
    <path d="M 25 60 C 25 85, 45 95, 60 95 C 75 95, 95 85, 95 60 L 95 45 L 25 45 Z" fill="none" stroke="url(#neonGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <!-- Cup Handle -->
    <path d="M 95 55 C 110 55, 115 65, 110 75 C 105 85, 95 80, 95 80" fill="none" stroke="url(#neonGradient)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Steam forming an 'A' -->
    <path d="M 60 35 C 50 25, 45 15, 60 5 C 75 -5, 75 15, 60 25 M 40 25 L 80 25" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 60 5 L 45 40 M 60 5 L 75 40" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <!-- Typography -->
  <g transform="translate(82, 32)">
    <text x="0" y="0" font-family="'Outfit', sans-serif, system-ui" font-size="24" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">THE AWARENESS</text>
    <text x="1" y="24" font-family="'Inter', sans-serif, system-ui" font-size="13" font-weight="600" fill="#C6FF00" letter-spacing="7">CAFE</text>
  </g>
</svg>
